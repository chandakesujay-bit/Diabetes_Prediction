<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patient Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            background:#eef5ff;
        }

        .patient-card{
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        .patient-card h2{
            color:#0d6efd;
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        label{
            color:#212529 !important;
            font-weight:600;
            margin-bottom:8px;
        }

        .form-control,
        .form-select{
            border-radius:10px;
            height:48px;
        }

        textarea.form-control{
            height:100px;
            resize:none;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

<div class="container-fluid">

<h3 class="text-white mb-0">

👤 Patient Details

</h3>

<div>

<a href="/dashboard" class="btn btn-light">

Dashboard

</a>

</div>

</div>

</nav>

<div class="container py-5">

<div class="patient-card">

<h2>

Patient Information

</h2>

<form action="/prediction" method="GET">

<div class="row">

<div class="col-md-6 mb-4">

<label>

Patient Name

</label>

<input

type="text"

name="name"

class="form-control"

placeholder="Enter Patient Name"

required>

</div>

<div class="col-md-6 mb-4">

<label>

Age

</label>

<input

type="number"

name="age"

class="form-control"

placeholder="Enter Age"

required>

</div>

<div class="col-md-6 mb-4">

<label>

Gender

</label>

<select

name="gender"

class="form-select"

required>

<option value="">

Select Gender

</option>

<option>

Male

</option>

<option>

Female

</option>

<option>

Other

</option>

</select>

</div>

<div class="col-md-6 mb-4">

<label>

Phone Number

</label>

<input

type="text"

name="phone"

class="form-control"

placeholder="Enter Phone Number"

required>

</div>

<div class="col-12 mb-4">

<label>

Address

</label>

<textarea

name="address"

class="form-control"

placeholder="Enter Address"

required>

</textarea>

</div>

</div>

<div class="text-center">

<button

type="submit"

class="btn btn-primary btn-lg px-5">

Continue to Prediction →

</button>

</div>

</form>

</div>

</div>

</body>

</html>
