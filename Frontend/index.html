<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diabetes Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="card prediction-card shadow-lg">

<h2 class="mb-4">
🩺 Diabetes Prediction System
</h2>

<!-- Patient Details -->

<div class="alert alert-primary">

<h5>👤 Patient Details</h5>

<div class="row">

<div class="col-md-6">

<p><strong>Name:</strong> {{ patient.name }}</p>

<p><strong>Age:</strong> {{ patient.age }}</p>

</div>

<div class="col-md-6">

<p><strong>Gender:</strong> {{ patient.gender }}</p>

<p><strong>Phone:</strong> {{ patient.phone }}</p>

</div>

</div>

</div>

<form action="/predict" method="POST">

<!-- Hidden Patient Fields -->

<input type="hidden" name="name" value="{{ patient.name }}">

<input type="hidden" name="age" value="{{ patient.age }}">

<input type="hidden" name="gender" value="{{ patient.gender }}">

<input type="hidden" name="phone" value="{{ patient.phone }}">

<input type="hidden" name="address" value="{{ patient.address }}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Pregnancies</label>

<input
type="number"
class="form-control"
name="Pregnancies"
required>

</div>

<div class="col-md-6 mb-3">

<label>Glucose</label>

<input
type="number"
class="form-control"
name="Glucose"
required>

</div>

<div class="col-md-6 mb-3">

<label>Blood Pressure</label>

<input
type="number"
class="form-control"
name="BloodPressure"
required>

</div>

<div class="col-md-6 mb-3">

<label>Skin Thickness</label>

<input
type="number"
class="form-control"
name="SkinThickness"
required>

</div>

<div class="col-md-6 mb-3">

<label>Insulin</label>

<input
type="number"
class="form-control"
name="Insulin"
required>

</div>

<div class="col-md-6 mb-3">

<label>BMI</label>

<input
type="number"
step="0.1"
class="form-control"
name="BMI"
required>

</div>

<div class="col-md-6 mb-3">

<label>Diabetes Pedigree Function</label>

<input
type="number"
step="0.001"
class="form-control"
name="DPF"
required>

</div>

<div class="col-md-6 mb-3">

<label>Age (Medical Input)</label>

<input
type="number"
class="form-control"
name="Age"
required>

</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-primary btn-lg px-5">

🔍 Predict

</button>

<a href="/patient" class="btn btn-secondary btn-lg ms-2">

⬅ Back

</a>

</div>

</form>

</div>

</div>

</body>

</html>
